  <meta name="apple-mobile-web-app-title" content="Em~power">
  <meta name="theme-color" content="#2c2820">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf8f5; color: #2c2820; padding-bottom: 100px; }
    .container { max-width: 420px; margin: 0 auto; padding: 0 16px; }

    .top-bar { background: #f5f0e8; padding: 16px 20px; border-bottom: 1px solid #ede8e0; display: flex; align-items: center; gap: 12px; max-width: 420px; margin: 0 auto; }
    .top-bar-back { font-size: 20px; color: #2c2820; text-decoration: none; }
    .top-bar-title { flex: 1; }
    .top-bar-wordmark { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #2c2820; }
    .top-bar-sub { font-size: 11px; color: #9a9590; margin-top: 1px; }

    .spinner { width: 32px; height: 32px; border: 3px solid #ede8e0; border-top-color: #c8b89a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .phase-banner { border-radius: 14px; padding: 20px; margin: 16px 0 12px; color: #f5f0e8; }
    .phase-banner.menstrual  { background: linear-gradient(135deg, #3d2830, #2c1f25); }
    .phase-banner.follicular { background: linear-gradient(135deg, #2c3828, #1f2c20); }
    .phase-banner.ovulatory  { background: linear-gradient(135deg, #2c3035, #1f252c); }
    .phase-banner.luteal     { background: linear-gradient(135deg, #352c20, #2c2415); }
    .phase-banner.perimenopause { background: linear-gradient(135deg, #2c2438, #1f1a2c); }
    .phase-banner.observation { background: linear-gradient(135deg, #2c2820, #1f1e18); }
    .banner-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; margin-bottom: 6px; }
    .banner-phase { font-size: 22px; font-style: italic; font-family: Georgia, serif; margin-bottom: 6px; }
    .banner-desc { font-size: 13px; opacity: 0.85; line-height: 1.55; }

    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #9a9590; margin: 20px 0 10px; }

    .card { background: #fff; border: 1px solid #ede8e0; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 14px; font-weight: 600; color: #2c2820; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .card-title i { color: #c8b89a; font-size: 18px; }

    /* Sleep quality history */
    .sleep-history { display: flex; align-items: flex-end; gap: 6px; height: 64px; margin-bottom: 8px; }
    .sleep-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .sleep-bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.3s; }
    .sleep-bar-label { font-size: 9px; color: #9a9590; white-space: nowrap; }
    .sleep-avg-line { font-size: 12px; color: #7a7268; margin-top: 4px; }

    /* Tips list */
    .tip-row { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f0ede8; }
    .tip-row:last-child { border-bottom: none; }
    .tip-icon { width: 32px; height: 32px; border-radius: 10px; background: #f5f0e8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .tip-icon i { font-size: 16px; color: #c8b89a; }
    .tip-text { flex: 1; }
    .tip-title { font-size: 13px; font-weight: 600; color: #2c2820; margin-bottom: 2px; }
    .tip-desc { font-size: 12px; color: #7a7268; line-height: 1.5; }

    /* Avoid list */
    .avoid-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f0ede8; }
    .avoid-row:last-child { border-bottom: none; }
    .avoid-dot { width: 6px; height: 6px; border-radius: 50%; background: #e09898; flex-shrink: 0; margin-top: 6px; }
    .avoid-text { font-size: 12px; color: #7a7268; line-height: 1.5; }

    /* Science note */
    .science-note { background: #f5f0e8; border-radius: 10px; padding: 12px; font-size: 11px; color: #7a7268; line-height: 1.6; margin-top: 10px; }

    /* Log button */
    .log-btn { display: block; background: #2c2820; color: #f5f0e8; border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 500; width: 100%; text-align: center; text-decoration: none; margin: 16px 0 8px; cursor: pointer; }

    /* Hormone note */
    .phase-note { font-size: 12px; color: #7a7268; line-height: 1.6; padding: 10px 0; }

    /* What is happening cards */
    .happening-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .happening-pill { background: #f5f0e8; border-radius: 10px; padding: 10px 12px; }
    .happening-pill-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9a9590; margin-bottom: 4px; }
    .happening-pill-value { font-size: 12px; color: #2c2820; line-height: 1.45; }

    /* Bottom nav */
    nav { position: fixed; bottom: 0; left: 0; right: 0; background: #f5f0e8; border-top: 1px solid #ede8e0; display: flex; justify-content: space-around; padding: 8px 0 20px; z-index: 100; max-width: 420px; margin: 0 auto; }
    nav a { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: #9a9590; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    nav a.active { color: #2c2820; }
    nav a i { font-size: 22px; }
  </style>
</head>

        <button onclick="logSleep('Good')"   class="sleep-log-btn" data-q="Good"      style="background:#f5f0e8;border:1.5px solid #ede8e0;border-radius:10px;padding:12px 4px;font-size:13px;font-weight:500;color:#2c2820;cursor:pointer">Good</button>
        <button onclick="logSleep('Great')"  class="sleep-log-btn" data-q="Great"     style="background:#f5f0e8;border:1.5px solid #ede8e0;border-radius:10px;padding:12px 4px;font-size:13px;font-weight:500;color:#2c2820;cursor:pointer">Great</button>

    </div>

    <div class="science-note" id="scienceNote"></div>

  </div>
</div>

        { label: 'Estrogen', value: 'Fluctuating' },
        { label: 'Progesterone', value: 'Declining' },
        { label: 'Hot flashes', value: 'Common trigger' },
        { label: 'Sleep quality', value: 'Often disrupted' }
      ],
      tips: [
        { icon: 'ti-temperature', title: 'Cool the room significantly', desc: 'A room temperature of 15 to 17 degrees Celsius is especially important in perimenopause. Moisture-wicking bedding can also reduce night sweat disruption.' },
        { icon: 'ti-leaf', title: 'Magnesium glycinate before bed', desc: '300 to 400mg supports the GABA system and muscle relaxation when progesterone is declining. This is one of the most evidence-supported supplements for perimenopausal sleep.' },
        { icon: 'ti-clock', title: 'Strict consistent wake time', desc: 'With fragmented sleep, a consistent wake time is the most powerful single tool to anchor your circadian rhythm and improve sleep drive the following night.' },
        { icon: 'ti-barbell', title: 'Strength training earlier in the day', desc: 'Resistance training significantly improves sleep quality in perimenopausal women. Morning or early afternoon is optimal. (Kohrt WM et al. MSSE 2004.)' },
        { icon: 'ti-brain', title: 'Talk to a doctor about HRT', desc: 'Hormone replacement therapy is one of the most effective interventions for perimenopausal sleep disruption. Current evidence supports its safety for most healthy women when started within 10 years of menopause. (Manson JE et al. NEJM 2013.)' }
      ],
      avoid: [
        'Alcohol entirely. It triggers hot flashes in many perimenopausal women and significantly worsens sleep architecture.',
        'Caffeine after 12pm. Sensitivity increases as estrogen declines.',
        'Hot rooms or heavy bedding, which amplify temperature-driven waking.',
        'Late evening exercise, which elevates core temperature when the body most needs to cool for sleep.'
      ],
      science: 'Source: Harlow SD et al. Climacteric 2012 (STRAW+10). Freeman EW et al. Archives of General Psychiatry 2004. Backstrom T et al. Psychoneuroendocrinology 2014. Manson JE et al. NEJM 2013. Kohrt WM et al. MSSE 2004.'
    },
    Observation: {
      bannerClass: 'observation',
      phase: 'Building your baseline',
      desc: 'Your hormone data is being established. The sleep guidance below reflects a low-estrogen environment, which is the most likely state during an observation or recovery phase.',
      hormonal: 'Without confirmed ovulation signals, your hormonal environment may resemble a low-estrogen state. Sleep is supported by consistent habits more than hormonal tailwinds right now.',
      grid: [
        { label: 'Estrogen', value: 'Uncertain' },
        { label: 'Progesterone', value: 'Uncertain' },
        { label: 'Building data', value: 'In progress' },
        { label: 'Sleep guidance', value: 'Foundational' }
      ],
      tips: [
        { icon: 'ti-sun', title: 'Morning light every day', desc: '10 minutes of natural light within 30 minutes of waking is the single most powerful circadian anchor. It costs nothing and has strong evidence behind it.' },
        { icon: 'ti-clock', title: 'Consistent sleep and wake times', desc: 'Without hormonal phase structure to lean on, your circadian rhythm is the most important sleep system to protect.' },
        { icon: 'ti-leaf', title: 'Magnesium glycinate', desc: '300 to 400mg before bed supports relaxation and the GABA system regardless of hormonal phase.' },
        { icon: 'ti-temperature', title: 'Cool dark room', desc: 'Sleep onset requires your core temperature to drop. A cool dark room supports this across all hormonal states.' }
      ],
      avoid: [
        'Alcohol, which disrupts all sleep stages regardless of hormonal phase.',
        'Caffeine after 1pm.',
        'Screens without blue light filter after 9pm.',
        'Inconsistent sleep timing, which fragments circadian rhythms further.'
      ],
      science: 'Source: Sims ST. ROAR 2024. De Martin Topranin V et al. IJSPP 2023. General sleep hygiene evidence: Walker M. Why We Sleep. Scribner 2017.'
    }
  }

  const QUALITY_COLOURS = { Poor: '#e09898', Fair: '#e0c070', Good: '#88c088', Great: '#68b068', Excellent: '#68b068' }
  const QUALITY_HEIGHTS = { Poor: 20, Fair: 36, Good: 52, Great: 60, Excellent: 60 }
  const QUALITY_LABELS = { Poor: 'Poor', Fair: 'Fair', Good: 'Good', Great: 'Great', Excellent: 'Excellent' }

  let _user = null

  window.logSleep = async function (quality) {
    if (!_user) return
    const today = new Date().toISOString().split('T')[0]
    const msg = document.getElementById('sleepLogMsg')

    // Highlight selected button
    document.querySelectorAll('.sleep-log-btn').forEach(b => {
      const selected = b.dataset.q === quality
      b.style.background = selected ? '#2c2820' : '#f5f0e8'
      b.style.color = selected ? '#f5f0e8' : '#2c2820'
      b.style.borderColor = selected ? '#2c2820' : '#ede8e0'
    })

    msg.textContent = 'Saving...'
    const { error } = await supabase.from('daily_logs').upsert(
      { user_id: _user.id, log_date: today, sleep_quality: quality },
      { onConflict: 'user_id,log_date' }
    )
    if (error) {
      msg.textContent = 'Could not save. Check your connection.'
    } else {
      msg.textContent = `Saved — ${quality} sleep logged for today.`
      // Refresh the 7-day bars to show new entry
      renderHistory(_user.id)
    }
  }

  async function renderHistory (userId) {
    const today = new Date()
    const dates = []
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate() - i)
      dates.push(d.toISOString().split('T')[0])
    }
    const { data: logs } = await supabase
      .from('daily_logs').select('log_date, sleep_quality')
      .eq('user_id', userId).in('log_date', dates).order('log_date', { ascending: true })

    const logMap = {}
    if (logs) logs.forEach(l => { logMap[l.log_date] = l.sleep_quality })

    const days = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa']
    const historyEl = document.getElementById('sleepHistory')
    let total = 0; let counted = 0
    historyEl.innerHTML = dates.map(d => {
      const q = logMap[d]
      const dayLabel = days[new Date(d + 'T12:00:00').getDay()]
      const isToday = d === today.toISOString().split('T')[0]
      if (q) { total += (q === 'Poor' ? 1 : q === 'Fair' ? 2 : q === 'Good' ? 3 : 4); counted++ }
      return `<div class="sleep-bar-wrap">
        <div class="sleep-bar" style="height:${q ? QUALITY_HEIGHTS[q] : 8}px;background:${q ? QUALITY_COLOURS[q] : '#ede8e0'};width:100%"></div>
        <div class="sleep-bar-label" style="color:${isToday ? '#2c2820' : '#9a9590'};font-weight:${isToday ? '700' : '400'}">${isToday ? 'Today' : dayLabel}</div>
      </div>`
    }).join('')

    if (counted > 0) {
      const avg = total / counted
      const avgLabel = avg < 1.75 ? 'Poor' : avg < 2.5 ? 'Fair' : avg < 3.25 ? 'Good' : 'Great'
      document.getElementById('sleepAvg').textContent = `7-day average: ${avgLabel} (${counted} of 7 days logged)`
    } else {
      document.getElementById('sleepAvg').textContent = 'No sleep data yet. Log your first night above.'
    }

    // Pre-select today's quality if already logged
    const todayQ = logMap[today.toISOString().split('T')[0]]
    if (todayQ) {
      document.querySelectorAll('.sleep-log-btn').forEach(b => {
        const selected = b.dataset.q === todayQ
        b.style.background = selected ? '#2c2820' : '#f5f0e8'
        b.style.color = selected ? '#f5f0e8' : '#2c2820'
        b.style.borderColor = selected ? '#2c2820' : '#ede8e0'
      })
      document.getElementById('sleepLogMsg').textContent = `${todayQ} sleep already logged for today.`
    }
  }

  async function init () {
    try {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = 'login.html'; return }
      _user = user

      const status = await getTodayStatus(supabase, user.id)
      const phase = status.subPhase || status.phase || 'Observation'
      const phaseKey = Object.keys(SLEEP_DATA).includes(phase) ? phase : (Object.keys(SLEEP_DATA).includes(status.phase) ? status.phase : 'Observation')
      const data = SLEEP_DATA[phaseKey] || SLEEP_DATA.Observation

      // Top bar sub label
      document.getElementById('topBarSub').textContent = status.phase === 'Perimenopause'
        ? 'Perimenopause support'
        : `${status.phase || 'Cycle'} phase, day ${status.cycleDay || ''}`

      // Banner
      document.getElementById('phaseBanner').className = `phase-banner ${data.bannerClass}`
      document.getElementById('bannerPhase').textContent = data.phase
      document.getElementById('bannerDesc').textContent = data.desc

      // Hormonal card
      document.getElementById('hormonalNote').textContent = data.hormonal
      const grid = document.getElementById('hormonalGrid')
      grid.innerHTML = data.grid.map(g => `
        <div class="happening-pill">
          <div class="happening-pill-label">${g.label}</div>
          <div class="happening-pill-value">${g.value}</div>
        </div>`).join('')

      // Tips
      const tipsCard = document.getElementById('tipsCard')
      tipsCard.innerHTML = data.tips.map(t => `
        <div class="tip-row">
          <div class="tip-icon"><i class="ti ${t.icon}"></i></div>
          <div class="tip-text">
            <div class="tip-title">${t.title}</div>
            <div class="tip-desc">${t.desc}</div>
          </div>
        </div>`).join('')

      // Avoid
      document.getElementById('avoidList').innerHTML = data.avoid.map(a => `
        <div class="avoid-row">
          <div class="avoid-dot"></div>
          <div class="avoid-text">${a}</div>
        </div>`).join('')

      // Science note
      document.getElementById('scienceNote').textContent = data.science

      await renderHistory(user.id)

      document.getElementById('spinner').style.display = 'none'
      document.getElementById('mainContent').style.display = 'block'

    } catch (err) {
      console.error('Sleep screen error:', err)
      document.getElementById('spinner').style.display = 'none'
      document.getElementById('mainContent').style.display = 'block'
    }
  }

  init()
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'SW_UPDATED') window.location.reload()
    })
  }
</script>
</body>
</html>
