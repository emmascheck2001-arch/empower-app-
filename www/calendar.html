<!DOCTYPE html>
<html lang="en">
<head>

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf8f5; color: #2c2820; padding-bottom: 100px; }
    .screen { max-width: 420px; margin: 0 auto; }

    #spinnerWrap { text-align: center; padding: 60px 20px; }

    .month-title { font-size: 18px; font-weight: 600; color: #2c2820; letter-spacing: -0.01em; }
    .month-btn { background: #f5f0e8; border: 1px solid #ede8e0; color: #6a5a4a; cursor: pointer; padding: 7px 9px; display: flex; align-items: center; border-radius: 10px; transition: background 0.1s; }
    .month-btn i { font-size: 17px; }
    .month-btn:active { background: #ede8e0; }

    .weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 14px; margin-bottom: 4px; }
    .weekday-lbl { text-align: center; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #b0a89a; padding: 4px 0 6px; }

      align-items: center;

      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;

    }
    .cal-cell.today .cal-num { background: #2c2820; color: #f5f0e8; font-weight: 700; }

    .cal-mood-dot {

    .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(44,40,32,0.48); z-index: 100; }

    .phase-pill { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .days-away-note { font-size: 11px; color: #9a9590; margin-top: 5px; font-style: italic; }

    .energy-lbl { font-size: 13px; color: #4a3828; min-width: 56px; text-align: right; }

    .disr-chip { padding: 3px 9px; border-radius: 99px; font-size: 11px; background: #fef4e4; color: #6a4a10; border: 1px solid #f0d498; }

    .wo-sub { font-size: 11px; color: #7a7268; line-height: 1.5; }

    .phase-why { font-size: 13px; color: #4a3828; line-height: 1.75; }

    .brain-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 99px; font-size: 12px; font-weight: 500; margin-top: 10px; }

    .pattern-note { font-size: 12px; color: #7a7268; font-style: italic; line-height: 1.7; background: #f8f5f0; border-radius: 10px; padding: 10px 12px; }

    .period-pred-card { background: #fce8e0; border: 1px solid #f0c0b0; border-radius: 12px; padding: 14px; margin-top: 4px; margin-bottom: 4px; }
    .period-pred-title { font-size: 14px; font-weight: 600; color: #5a2820; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }

    'Serotonin dropping': 'Estrogen is declining and serotonin stability is reducing with it. Mixed mood days have a specific biochemical cause in mid-luteal.',
    'Serotonin crash':    'Both estrogen and progesterone are dropping. Many women find this day emotionally heavier. That is biology, not weakness.',
    'Low estrogen':       'Without a confirmed cycle, reduced estrogen support means less serotonin activity. The mood effects are real and have a hormonal cause.'
  }

  // ── State ─────────────────────────────────────────────────────────────────────
  let viewYear, viewMonth
  let todayDate, todayStr
  let userId
  let lastPeriodDate = null
  let avgCycleLen = 28
  let cyclesTracked = 0
  let predNextPeriod = null
  let logsByDate = {}
  let mucusByDate = {}
  let isPath4 = false

  // ── Init ──────────────────────────────────────────────────────────────────────
  try {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = 'login.html' }
    userId = user.id

    todayDate = new Date(); todayDate.setHours(0, 0, 0, 0)
    todayStr = todayDate.toISOString().split('T')[0]
    viewYear = todayDate.getFullYear()
    viewMonth = todayDate.getMonth()

    const [cycleRes, profileRes, baselineRes] = await Promise.all([
      supabase.from('cycle_data').select('*').eq('user_id', userId).order('created_at', { ascending: false }).limit(1).single(),
      supabase.from('profiles').select('cycle_length, cycles_tracked, user_path').eq('id', userId).single(),
      supabase.from('user_baselines').select('avg_cycle_length, cycles_tracked').eq('user_id', userId).single()
    ])

    const cycleData = cycleRes.data
    const profileData = profileRes.data
    const baselines = baselineRes.data
    isPath4 = profileData?.user_path === '4'

    if (cycleData?.last_period_date) {
      lastPeriodDate = cycleData.last_period_date
      avgCycleLen = baselines?.avg_cycle_length || cycleData.cycle_length || profileData?.cycle_length || 28
      cyclesTracked = baselines?.cycles_tracked || profileData?.cycles_tracked || 1
    } else {
      avgCycleLen = profileData?.cycle_length || 28
      cyclesTracked = profileData?.cycles_tracked || 0
    }

    // Build period prediction for the CURRENT cycle (advance past already-completed cycles)
    if (lastPeriodDate && cyclesTracked >= 1) {
      const lastP = new Date(lastPeriodDate + 'T00:00:00')
      const diffDays = Math.floor((todayDate - lastP) / 86400000)
      const completedCycles = Math.floor(diffDays / Math.round(avgCycleLen))
      const curCycleStart = new Date(lastP)
      curCycleStart.setDate(curCycleStart.getDate() + completedCycles * Math.round(avgCycleLen))
      predNextPeriod = predictNextPeriod(curCycleStart.toISOString().split('T')[0], avgCycleLen, cyclesTracked)
    }

    // Subtitle
    if (isPath4) {
      document.getElementById('cycleSubLabel').textContent = 'Symptom burden calendar'
    } else if (lastPeriodDate) {
      const diff = Math.floor((todayDate - new Date(lastPeriodDate + 'T00:00:00')) / 86400000)
      const cycleDay = (diff % Math.round(avgCycleLen)) + 1
      document.getElementById('cycleSubLabel').textContent = `Day ${cycleDay} of ${Math.round(avgCycleLen)}`
    } else {
      document.getElementById('cycleSubLabel').textContent = 'Building baseline'
    }

    if (isPath4) {
      document.getElementById('calLegend').innerHTML = `
        <div class="legend-item"><div class="legend-dot" style="background:#b8e0b8"></div><span>Low burden</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e0c060"></div><span>Moderate</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e09090"></div><span>High burden</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#d8d0c8"></div><span>Not logged</span></div>
      `
    }

    await loadLogs(viewYear, viewMonth)
    renderMonth()
    renderBanner()

  } catch (err) {
    console.error('Calendar init error:', err)
  } finally {
    document.getElementById('spinnerWrap').style.display = 'none'
    document.getElementById('mainContent').style.display = 'block'
  }

  // ── Load logs for displayed month (with buffer) ───────────────────────────────
  async function loadLogs(yr, mo) {
    const start = new Date(yr, mo, -6).toISOString().split('T')[0]
    const end   = new Date(yr, mo + 1, 7).toISOString().split('T')[0]
    try {
      const [logsRes, mucusRes] = await Promise.all([
        supabase.from('daily_logs').select('log_date,energy,mood,sleep_quality,symptoms,disruptors,pain_rating,flow_volume,resting_hr,wrist_temp,workout_feel,notes,lh_result,hormone_estradiol,hormone_progesterone,hormone_lh,hormone_cortisol').eq('user_id', userId).gte('log_date', start).lte('log_date', end),
        supabase.from('mucus_logs').select('log_date,discharge_type,spotting_type').eq('user_id', userId).gte('log_date', start).lte('log_date', end)
      ])
      for (const l of (logsRes.data || [])) logsByDate[l.log_date] = l
      for (const m of (mucusRes.data || [])) mucusByDate[m.log_date] = m
    } catch (e) { console.error('Log load error:', e) }
  }

  // ── Navigate months ───────────────────────────────────────────────────────────
  window.navigateMonth = async function(dir) {
    viewMonth += dir
    if (viewMonth > 11) { viewMonth = 0; viewYear++ }
    if (viewMonth < 0)  { viewMonth = 11; viewYear-- }
    await loadLogs(viewYear, viewMonth)
    renderMonth()
  }

  // ── Phase for any given date ──────────────────────────────────────────────────
  function phaseForDate(date) {
    if (!lastPeriodDate) return null
    const last = new Date(lastPeriodDate + 'T00:00:00')
    const diff = Math.floor((date - last) / 86400000)
    if (diff < 0) return null
    const cl = Math.round(avgCycleLen)
    const cycleDay = (diff % cl) + 1
    const phase = getPhase(cycleDay, cl)
    const subPhase = phase === 'Luteal' ? getLutealSubPhase(cycleDay, cl)
      : phase === 'Follicular' ? (cycleDay <= 9 ? 'Early follicular' : 'Late follicular')
      : phase
    return { phase, subPhase, cycleDay }
  }

  // ── Period prediction status for a date ───────────────────────────────────────
  function periodStatus(date) {
    if (!predNextPeriod) return null
    const ms = date.getTime()
    const predMs  = predNextPeriod.predictedDate.getTime()
    const startMs = predNextPeriod.windowStart.getTime()
    const endMs   = predNextPeriod.windowEnd.getTime()
    const prePad  = new Date(predNextPeriod.windowStart); prePad.setDate(prePad.getDate() - 2)
    if (ms === predMs) return 'exact'
    if (ms >= startMs && ms <= endMs) return 'window'
    if (ms >= prePad.getTime() && ms < startMs) return 'pre'
    return null
  }

  // ── Symptom burden for Path 4 ─────────────────────────────────────────────────
  const BURDEN_COLORS = {
    none:     { bar: '#b8e0b8', bg: 'rgba(120,200,120,0.10)', label: 'Low burden' },
    moderate: { bar: '#e0c060', bg: 'rgba(220,180,60,0.12)',  label: 'Moderate burden' },
    high:     { bar: '#e09090', bg: 'rgba(220,100,100,0.14)', label: 'High burden' },
    unlogged: { bar: null,      bg: null,                     label: 'Not logged' }
  }

  function burdenLevel(log) {
    if (!log) return 'unlogged'
    let score = 0
    if (log.energy === 'Very low') score += 2
    else if (log.energy === 'Low') score += 1
    if (log.sleep_quality === 'Poor') score += 2
    if (log.symptoms?.includes('Fatigue')) score += 1
    if (log.symptoms?.includes('Brain fog')) score += 1
    if (log.pain_rating >= 4) score += 2
    else if (log.pain_rating >= 2) score += 1
    if (score === 0) return 'none'
    if (score <= 3) return 'none'
    if (score <= 5) return 'moderate'
    return 'high'
  }

  // ── Render the month grid ─────────────────────────────────────────────────────
  function renderMonth() {
    document.getElementById('monthTitle').textContent = MONTHS[viewMonth] + ' ' + viewYear
    const grid = document.getElementById('calGrid')
    grid.innerHTML = ''

    const startDow = new Date(viewYear, viewMonth, 1).getDay()
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate()
    const cells = []

    for (let i = startDow - 1; i >= 0; i--) cells.push({ date: new Date(viewYear, viewMonth, -i), inMonth: false })
    for (let d = 1; d <= daysInMonth; d++) cells.push({ date: new Date(viewYear, viewMonth, d), inMonth: true })
    let t = 1
    while (cells.length % 7 !== 0) cells.push({ date: new Date(viewYear, viewMonth + 1, t++), inMonth: false })

    for (const cell of cells) {
      const ds = cell.date.toISOString().split('T')[0]
      const isToday = ds === todayStr
      const isPast = cell.date < todayDate
      const isFuture = cell.date > todayDate
      const log = logsByDate[ds]

      const el = document.createElement('div')
      el.className = 'cal-cell' + (cell.inMonth ? '' : ' other-month')
      if (isToday) el.classList.add('today')

      // Date number
      const numEl = document.createElement('div')
      numEl.className = 'cal-num'
      numEl.textContent = cell.date.getDate()
      el.appendChild(numEl)

      if (cell.inMonth) {
        const pi = isPath4 ? null : phaseForDate(cell.date)
        if (isPath4) {
          // Path 4: symptom burden coloring
          const burden = isPast || isToday ? burdenLevel(log) : 'unlogged'
          const bc = BURDEN_COLORS[burden]
          if (bc.bg && (isPast || isToday)) el.style.background = bc.bg
          const bar = document.createElement('div')
          bar.className = 'cal-phase-bar'
          if (bc.bar && (isPast || isToday)) bar.style.background = bc.bar
          else bar.style.opacity = '0'
          el.appendChild(bar)
        } else {
          const pc = pi ? (PC[pi.subPhase] || PC[pi.phase]) : null
          const ps = periodStatus(cell.date)

          // Subtle phase or period background tint on cell
          if (ps === 'exact') {
            el.style.background = 'rgba(200,88,88,0.13)'
          } else if (ps === 'window') {
            el.style.background = 'rgba(200,100,90,0.08)'
          } else if (ps === 'pre') {
            el.style.background = 'rgba(220,160,150,0.06)'
          } else if (pc?.dot) {
            const r = parseInt(pc.dot.slice(1,3),16), g = parseInt(pc.dot.slice(3,5),16), bl = parseInt(pc.dot.slice(5,7),16)
            el.style.background = `rgba(${r},${g},${bl},${isFuture ? 0.06 : 0.10})`
          }

          // Mood dot top-right — coloured for logged mood, neutral for any other log
          if (log?.mood?.length > 0) {
            const mDot = document.createElement('div')
            mDot.className = 'cal-mood-dot'
            const mc = MC[log.mood[0]]
            mDot.style.background = mc ? mc.bg : '#f0ece4'
            mDot.style.border = `1px solid ${mc ? mc.border : '#d8d0c8'}`
            el.appendChild(mDot)
          } else if (log && isPast) {
            const mDot = document.createElement('div')
            mDot.className = 'cal-mood-dot'
            mDot.style.background = '#dcd8d0'
            mDot.style.border = '1px solid #c8c0b8'
            el.appendChild(mDot)
          }

          // Phase or period colour bar across the bottom of the cell
          const bar = document.createElement('div')
          bar.className = 'cal-phase-bar' + (isFuture ? ' future' : '')
          if (ps === 'exact')       bar.style.background = '#c85858'
          else if (ps === 'window') bar.style.background = '#d88080'
          else if (ps === 'pre')    bar.style.background = '#f0b8b8'
          else if (pc?.dot)         bar.style.background = pc.dot
          else                      bar.style.opacity = '0'
          el.appendChild(bar)
        }

        // Click handler
        el.addEventListener('click', () => {
          if (isFuture) openFutureSheet(cell.date, ds, pi)
          else openPastSheet(cell.date, ds, pi, log, mucusByDate[ds])
        })
      }

      grid.appendChild(el)
    }
  }

  // ── Period prediction banner ──────────────────────────────────────────────────
  function renderBanner() {
    if (isPath4 || !predNextPeriod || cyclesTracked < 1) return
    const daysAway = Math.round((predNextPeriod.predictedDate.getTime() - todayDate.getTime()) / 86400000)
    let text = null

    if (daysAway > 14) return
    else if (daysAway >= 8)  text = `Period expected in approximately ${daysAway} days.`
    else if (daysAway >= 4)  text = `Period likely in ${daysAway - 1} to ${daysAway + 1} days. Start magnesium and anti-inflammatory foods now.`
    else if (daysAway >= 1)  text = `Period expected very soon. Iron-rich foods and heat therapy ready.`
    else if (daysAway >= -2) text = `Period due around now. Cycles naturally vary by a few days.`
    else if (daysAway >= -5) text = `Your period is a few days later than predicted. Cycle length naturally varies. Keep logging.`
    else                     text = `Your period is later than usual. Stress, illness, travel, and changes in exercise or nutrition can all delay a cycle. If this persists mention it to your doctor.`

    if (!text) return
    const conf = cyclesTracked >= 3 ? `Based on your personal cycle average of ${Math.round(avgCycleLen)} days`
      : cyclesTracked === 2 ? 'Based on your last 2 cycles'
      : 'Based on your first cycle. Will become more accurate over time.'
    document.getElementById('periodBanner').style.display = 'block'
    document.getElementById('periodBannerText').textContent = text
    document.getElementById('periodBannerConf').textContent = conf
  }

  // ── Past day sheet ────────────────────────────────────────────────────────────
  async function openPastSheet(date, ds, pi, log, mucus) {
    const content = document.getElementById('pastContent')
    content.innerHTML = '<div style="padding:20px 0;text-align:center;color:#9a9590;font-size:13px">Loading...</div>'
    openSheet('pastSheet')

    try {
      // Lazy-fetch full log if we only have summary data
      let fullLog = log
      if (ds && (!fullLog || fullLog.hormone_estradiol === undefined)) {
        const { data } = await supabase.from('daily_logs').select('*').eq('user_id', userId).eq('log_date', ds).maybeSingle()
        if (data) { fullLog = data; logsByDate[ds] = data }
      }
      let fullMucus = mucus
      if (ds && !fullMucus) {
        const { data } = await supabase.from('mucus_logs').select('*').eq('user_id', userId).eq('log_date', ds).maybeSingle()
        if (data) { fullMucus = data; mucusByDate[ds] = data }
      }

      const subPhase = pi?.subPhase || pi?.phase || null
      const phase = pi?.phase || null
      const pc = subPhase ? (PC[subPhase] || PC[phase]) : null
      const pred = subPhase ? (PHASE_PREDICTIONS[subPhase] || PHASE_PREDICTIONS[phase]) : null
      const brainState = pred?.brain_state
      const bs = brainState ? BRAIN_STATE_STYLES[brainState] : null

      const formatted = DAYS_LONG[date.getDay()] + ' ' + MONTHS[date.getMonth()] + ' ' + date.getDate()
      const phaseLabel = subPhase ? subPhase + ' phase' : (phase ? phase + ' phase' : 'Building baseline')

      let html = `<div class="sheet-hdr">
        <div class="sheet-date-line">${formatted}</div>
        <span class="phase-pill" style="background:${pc?.bg || '#e8e5e0'};color:${pc?.text || '#4a4540'}">${phaseLabel}</span>
      </div>`

      const hasEnergy   = !!fullLog?.energy
      const hasMood     = fullLog?.mood?.length > 0
      const hasSleep    = !!fullLog?.sleep_quality
      const hasPain     = fullLog?.pain_rating > 0
      const hasFlow     = !!fullLog?.flow_volume
      const hasSymp     = fullLog?.symptoms?.length > 0
      const hasDisr     = fullLog?.disruptors?.length > 0
      const hasSection1 = hasEnergy || hasMood || hasSleep || hasPain || hasFlow || hasSymp || hasDisr

      const hasLH     = !!fullLog?.lh_result
      const hasTemp   = !!fullLog?.wrist_temp
      const hasMucus  = !!fullMucus?.discharge_type
      const hasHorms  = !!(fullLog?.hormone_estradiol || fullLog?.hormone_progesterone || fullLog?.hormone_lh || fullLog?.hormone_cortisol)
      const hasSection2 = hasLH || hasTemp || hasMucus || hasHorms

      const hasWorkout = !!(fullLog?.workout_feel || fullLog?.notes)

      // SECTION 1 — How you felt today
      if (hasSection1) {
        html += `<div class="sec-lbl">How you felt today</div>`

        if (hasEnergy) {
          const em = { 'Very low': { pct: 20, col: '#e09898' }, 'Low': { pct: 40, col: '#e0c070' }, 'Good': { pct: 70, col: '#88c088' }, 'High': { pct: 100, col: '#50b850' } }
          const e = em[fullLog.energy] || { pct: 50, col: '#c8b89a' }
          html += `<div class="energy-wrap">
            <div class="energy-bg"><div class="energy-fill" style="width:${e.pct}%;background:${e.col}"></div></div>
            <div class="energy-lbl">${fullLog.energy}</div>
          </div>`
        }

        if (hasMood) {
          html += `<div class="chip-row">`
          fullLog.mood.forEach(m => {
            const mc = MC[m] || { bg: '#e8e5e0', text: '#4a4540', border: '#c8c0b8' }
            html += `<span class="mood-chip" style="background:${mc.bg};color:${mc.text};border:1px solid ${mc.border}">${m}</span>`
          })
          html += `</div>`
        }

        if (hasSleep) {
          const sleepIcon = (fullLog.sleep_quality === 'Great' || fullLog.sleep_quality === 'Good') ? 'ti-moon' : 'ti-moon-off'
          const sleepCol  = fullLog.sleep_quality === 'Great' ? '#d4a020' : fullLog.sleep_quality === 'Good' ? '#c8b060' : '#9a9590'
          html += `<div class="icon-row"><i class="ti ${sleepIcon}" style="color:${sleepCol}"></i><span>Sleep: ${fullLog.sleep_quality}</span></div>`
        }

        if (hasPain) {
          const high = fullLog.pain_rating >= 4
          html += `<div class="icon-row"><i class="ti ti-flame" style="color:${high ? '#c84040' : '#c8c0b8'}"></i><span>Pain: ${fullLog.pain_rating} out of 5${high ? '. Pain that disrupts daily life is worth investigating.' : ''}</span></div>`
        }

        if (hasFlow) {
          html += `<div class="icon-row"><i class="ti ti-droplet" style="color:#d09090"></i><span>Flow: ${fullLog.flow_volume}</span></div>`
        }

        if (hasSymp) {
          html += `<div class="chip-row">${fullLog.symptoms.map(s => `<span class="symp-chip">${s}</span>`).join('')}</div>`
        }

        if (hasDisr) {
          html += `<div class="chip-row">${fullLog.disruptors.map(d => `<span class="disr-chip"><i class="ti ti-alert-circle" style="font-size:10px;margin-right:3px;vertical-align:middle"></i>${d}</span>`).join('')}</div>`
        }

        html += `<div class="sec-div"></div>`
      }

      // SECTION 2 — Cycle signals
      if (hasSection2) {
        html += `<div class="sec-lbl">Cycle signals</div>`

        if (hasLH) {
          const isPos = fullLog.lh_result === 'Positive' || Number(fullLog.lh_result) > 8
          html += `<div class="lh-tag ${isPos ? 'lh-pos' : 'lh-neg'}"><i class="ti ${isPos ? 'ti-circle-check' : 'ti-circle'}"></i>LH ${isPos ? 'surge detected' : 'baseline'}</div>`
        }

        if (hasTemp) {
          html += `<div class="icon-row"><i class="ti ti-thermometer" style="color:#c8a87a"></i><span>Wrist temperature: ${fullLog.wrist_temp}C</span></div>`
        }

        if (hasMucus) {
          const mucusMap = { 'Nothing': 'No discharge observed', 'Egg white': 'Egg white discharge. Consistent with your fertile window. (Bigelow et al. 2004)', 'Watery': 'Watery discharge', 'Creamy': 'Creamy discharge', 'Spotting': 'Light spotting' }
          html += `<div class="icon-row"><i class="ti ti-droplets" style="color:#90c8e8"></i><span>${mucusMap[fullMucus.discharge_type] || fullMucus.discharge_type}</span></div>`
        }

        if (hasHorms) {
          const hormoneDefs = [
            { key: 'hormone_estradiol',    name: 'Estradiol',     unit: 'pmol/L', low: 77,  high: 1959 },
            { key: 'hormone_progesterone', name: 'Progesterone',  unit: 'nmol/L', low: 0.1, high: 50   },
            { key: 'hormone_lh',           name: 'LH',            unit: 'IU/L',   low: 2,   high: 90   },
            { key: 'hormone_cortisol',     name: 'Cortisol',      unit: 'nmol/L', low: 10,  high: 30   }
          ]
          const logged = hormoneDefs.filter(h => fullLog[h.key])
          if (logged.length > 0) {
            html += `<div class="horm-grid">`
            logged.forEach(h => {
              const pct = Math.min(100, Math.max(4, ((fullLog[h.key] - h.low) / (h.high - h.low)) * 100))
              html += `<div class="horm-item">
                <div class="horm-name">${h.name}</div>
                <div class="horm-val">${fullLog[h.key]}<span class="horm-unit"> ${h.unit}</span></div>
                <div class="horm-bar-bg"><div class="horm-bar-fill" style="width:${pct}%"></div></div>
              </div>`
            })
            html += `</div>`
            html += `<div style="font-size:10px;color:#9a9590;font-style:italic;margin-bottom:6px;line-height:1.5">Population reference range shown. Your personal normal may differ. (LifeLabs/EORLA; Munster et al. 2021)</div>`
          }
        }

        html += `<div class="sec-div"></div>`
      }

      // SECTION 3 — Workout
      if (hasWorkout) {
        html += `<div class="sec-lbl">Workout</div>
        <div class="wo-card">
          <div class="wo-title">Session logged</div>
          <div class="wo-sub">${fullLog.workout_feel ? 'Felt ' + fullLog.workout_feel.toLowerCase() : ''}${fullLog.notes ? (fullLog.workout_feel ? '. ' : '') + fullLog.notes : ''}</div>
        </div>
        <div class="sec-div"></div>`
      }

      // SECTION 4 — What this day meant (always show when phase is known)
      if (pred) {
        html += `<div class="sec-lbl">What was happening hormonally</div>
        <div class="phase-why">${pred.why}</div>`
        if (bs) {
          html += `<div><span class="brain-pill" style="background:${bs.bg};color:${bs.text}">${brainState}</span></div>`
        }
        html += `<div class="sec-div"></div>`
      }

      // SECTION 5 — Personal pattern placeholder
      if (cyclesTracked >= 2) {
        html += `<div class="sec-lbl">Your pattern</div>
        <div class="pattern-note">Keep logging consistently through this phase across multiple cycles. Your personal energy and mood patterns for this cycle day will appear here after 2 full cycles.</div>
        <div class="sec-div"></div>`
      }

      // Bottom button
      const hasAnyLog = hasSection1 || hasSection2 || hasWorkout
      if (hasAnyLog) {
        html += `<a href="log.html" class="sheet-action-sec">Edit this day's log</a>`
      } else {
        html += `<a href="log.html" class="sheet-action-btn">Log this day</a>`
      }

      content.innerHTML = html
    } catch (e) {
      console.error('Past sheet error:', e)
      content.innerHTML = '<div style="padding:20px;color:#8a5050;font-size:13px">Something went wrong loading this day.</div>'
    }
  }

  // ── Future day sheet ──────────────────────────────────────────────────────────
  function openFutureSheet(date, ds, pi) {
    const subPhase = pi?.subPhase || pi?.phase || 'observation'
    const phase    = pi?.phase || 'observation'
    const pc       = PC[subPhase] || PC[phase] || PC['observation']
    const pred     = PHASE_PREDICTIONS[subPhase] || PHASE_PREDICTIONS[phase] || PHASE_PREDICTIONS['observation']
    const suggs    = SUGGESTIONS[subPhase] || SUGGESTIONS[phase] || SUGGESTIONS['observation']
    const brainState = pred?.brain_state
    const bs       = brainState ? BRAIN_STATE_STYLES[brainState] : null

    const diffDays   = Math.round((date.getTime() - todayDate.getTime()) / 86400000)
    const daysAwayTx = diffDays === 1 ? 'tomorrow' : `in ${diffDays} days`
    const formatted  = DAYS_LONG[date.getDay()] + ' ' + MONTHS[date.getMonth()] + ' ' + date.getDate()
    const phaseLabel = subPhase !== 'observation' ? subPhase + ' phase' : 'Building baseline'
    const ps         = periodStatus(date)
    const showPeriod = ps && (ps === 'exact' || ps === 'window' || ps === 'pre')

    const confPct = cyclesTracked >= 3 ? 82 : cyclesTracked === 2 ? 62 : cyclesTracked === 1 ? 42 : 20
    const confLabel = confPct >= 75 ? 'High confidence based on your personal cycle data'
      : confPct >= 50 ? 'Moderate confidence based on a mix of your data and population averages'
      : 'Early estimate based on population averages while we learn your cycle'

    let html = `<div class="sheet-hdr">
      <div class="sheet-date-line">${formatted}</div>
      <span class="phase-pill" style="background:${pc.bg};color:${pc.text}">${phaseLabel}</span>
      <div class="days-away-note">${daysAwayTx}${confPct < 50 ? '. Estimated from your average cycle length.' : ''}</div>
    </div>`

    // SECTION 1 — Period prediction card
    if (showPeriod && predNextPeriod) {
      const pDate  = predNextPeriod.predictedDate.toLocaleDateString('en-CA', { month: 'long', day: 'numeric' })
      const pStart = predNextPeriod.windowStart.toLocaleDateString('en-CA', { month: 'long', day: 'numeric' })
      const pEnd   = predNextPeriod.windowEnd.toLocaleDateString('en-CA', { month: 'long', day: 'numeric' })
      html += `<div class="period-pred-card">
        <div class="period-pred-title"><i class="ti ti-droplet" style="color:#c06060;font-size:15px"></i>Your period may start around this day</div>
        <div class="period-pred-body">Based on your average cycle length of ${Math.round(avgCycleLen)} days, your next period is predicted around ${pDate}. The window is ${pStart} to ${pEnd}.<br><br>What to have ready: period products, a heat pad, iron-rich foods, and magnesium.<br><br>Starting 3 to 5 days before: anti-inflammatory foods, reduce caffeine and alcohol, and increase magnesium-rich foods such as dark chocolate, pumpkin seeds, and leafy greens.<br><br>This prediction is based on ${cyclesTracked} cycle${cyclesTracked !== 1 ? 's' : ''} of your personal data.</div>
      </div>
      <div class="sec-div"></div>`
    }

    // SECTION 2 — What to expect
    if (pred) {
      html += `<div class="sec-lbl">What to expect</div>
      <div class="phase-why">${pred.why}</div>`

      const intensityWord = pred.intensity >= 1.0 ? 'High energy' : pred.intensity >= 0.90 ? 'Good energy' : pred.intensity >= 0.80 ? 'Moderate energy' : 'Low energy'
      html += `<div class="quick-chips">
        <span class="quick-chip"><i class="ti ti-bolt" style="font-size:11px;margin-right:2px"></i>${intensityWord}</span>
        <span class="quick-chip" style="background:${pc.bg};color:${pc.text}">${subPhase !== 'observation' ? subPhase : 'Observation'}</span>
        <span class="quick-chip">${Math.round((pred.intensity || 0.72) * 100)}% intensity</span>
      </div>
      <div class="sec-div"></div>`
    }

    // SECTION 3 — Your brain this day
    if (brainState && bs) {
      const sentence = BRAIN_SENTENCES[brainState] || ''
      html += `<div class="sec-lbl">Your brain this day</div>
      <span class="brain-pill" style="background:${bs.bg};color:${bs.text}">${brainState}</span>`
      if (sentence) html += `<div style="font-size:13px;color:#4a3828;line-height:1.7;margin-top:8px">${sentence}</div>`
      html += `<div class="sec-div"></div>`
    }

    // SECTION 4 — Plan ahead
    if (suggs?.length > 0) {
      html += `<div class="sec-lbl">Plan ahead</div>
      <div class="plan-list">`
      suggs.forEach(s => {
        html += `<div class="plan-row"><i class="ti ${s.icon} plan-icon"></i><span>${s.text}</span></div>`
      })
      html += `</div><div class="sec-div"></div>`
    }

    // SECTION 5 — Personal prediction
    html += `<div class="sec-lbl">Personal prediction</div>`
    if (cyclesTracked >= 2) {
      html += `<div class="pattern-note">Your logged history around this cycle phase will show here as your data builds across multiple cycles. Keep logging daily to see your personal patterns instead of population estimates.</div>`
    } else {
      html += `<div class="pattern-note">Keep logging daily. After 2 full cycles this section will show your personal predictions instead of population estimates. Individual variation is the norm, not the exception.</div>`
    }
    html += `<div class="sec-div"></div>`

    // SECTION 6 — Prediction confidence
    html += `<div class="sec-lbl">Prediction confidence</div>
    <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${confPct}%"></div></div>
    <div class="conf-note">${confLabel}</div>
    <div class="sec-div"></div>`

    // SECTION 7 — Reminder button
    const reminderText = {
      'Late luteal': 'Start magnesium and anti-inflammatory foods today',
      'Ovulatory':   'Peak performance window. Schedule your hardest workout today.',
      'Menstrual':   'Rest and prioritise iron-rich foods today',
      'Follicular':  'Building energy. Good time for progressive overload.',
      'Early follicular': 'Easing back into training. Energy is returning.',
      'Late follicular':  'Peak training window approaching.',
      'Early luteal': 'Keep protein high and stay well hydrated.',
      'Mid luteal':   'Honour your appetite today. Protein and whole foods.',
    }
    const rNote = reminderText[subPhase] || reminderText[phase] || phaseLabel + ' begins'
    html += `<button class="reminder-btn" onclick="openReminder('${ds}', '${rNote.replace(/'/g, "\\'")}')">
      <i class="ti ti-bell" style="font-size:16px"></i>Set a reminder for this day
    </button>`

    document.getElementById('futureContent').innerHTML = html
    openSheet('futureSheet')
  }

  // ── Reminder via .ics download ───────────────────────────────────────────────
  window.openReminder = function(ds, note) {
    const dStr = ds.replace(/-/g, '')
    const title = encodeURIComponent('Em~power: ' + note)
    const ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nDTSTART;VALUE=DATE:${dStr}\r\nDTEND;VALUE=DATE:${dStr}\r\nSUMMARY:Em~power - ${note}\r\nDESCRIPTION:${note}\r\nEND:VEVENT\r\nEND:VCALENDAR`
    const blob = new Blob([ics], { type: 'text/calendar' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = 'reminder.ics'; a.click()
    setTimeout(() => URL.revokeObjectURL(url), 1000)
  }

  // ── Sheet control ─────────────────────────────────────────────────────────────
  function openSheet(id) {
    document.getElementById('sheetOverlay').classList.add('open')
    document.getElementById(id).classList.add('open')
  }

  window.closeSheet = function() {
    document.getElementById('sheetOverlay').classList.remove('open')
    document.getElementById('pastSheet').classList.remove('open')
    document.getElementById('futureSheet').classList.remove('open')
  }

  document.getElementById('pastSheet').addEventListener('click', e => e.stopPropagation())
  document.getElementById('futureSheet').addEventListener('click', e => e.stopPropagation())
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')
  ;(function () {
    var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent)
    var isStandalone = window.navigator.standalone === true
    if (!isIOS || isStandalone || localStorage.getItem('pwa-prompt-dismissed')) return
    var b = document.createElement('div')
    b.style.cssText = 'position:fixed;bottom:80px;left:16px;right:16px;background:#2c2820;color:#faf8f5;font-size:13px;padding:12px 14px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.18)'
    var msg = document.createElement('span')
    msg.style.lineHeight = '1.4'
    msg.textContent = 'Add Em~power to your home screen for the full experience'
    var x = document.createElement('button')
    x.textContent = '\u2715'
    x.setAttribute('aria-label', 'Dismiss')
    x.style.cssText = 'background:none;border:none;color:#faf8f5;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1'
    x.onclick = function () { b.remove(); localStorage.setItem('pwa-prompt-dismissed', '1') }
    b.appendChild(msg)
    b.appendChild(x)
    document.body.appendChild(b)
  })()
</script>
</body>
</html>
